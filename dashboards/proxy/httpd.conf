ServerRoot "/usr/local/apache2"
ServerName localhost
User daemon
Group daemon

LoadModule mpm_event_module modules/mod_mpm_event.so

LoadModule log_config_module modules/mod_log_config.so
LoadModule logio_module modules/mod_logio.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule alias_module modules/mod_alias.so
LoadModule rewrite_module modules/mod_rewrite.so

LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so

Listen 80
ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 combined

# =========================
# mynodehost.io
# =========================
<VirtualHost *:80>
    ServerName mynodehost.io

    ProxyPreserveHost On
    ProxyRequests Off

    <Directory />
        AllowOverride none
        Require all granted
    </Directory>

    ProxyPass "/" "http://mynodehost-vitrine:3000/"
    ProxyPassReverse "/" "http://mynodehost-vitrine:3000/"
</VirtualHost>

# =========================
# status.mynodehost.io
# =========================
<VirtualHost *:80>
    ServerName status.mynodehost.io

    ProxyPreserveHost On
    ProxyRequests Off

    RewriteEngine On
    RewriteRule ^/$ /status [R=302,L]

    <LocationMatch "^/(dashboard|settings|add|edit|delete|login)">
        Require all denied
    </LocationMatch>

    ProxyPass "/" "http://uptime-kuma:3001/"
    ProxyPassReverse "/" "http://uptime-kuma:3001/"
</VirtualHost>